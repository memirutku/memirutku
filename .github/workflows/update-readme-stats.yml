name: Update README stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-readme-stats
  cancel-in-progress: true

jobs:
  cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Verify Actions secret
        env:
          README_STATS_PAT: ${{ secrets.README_STATS_PAT }}
        run: |
          if [ -z "$README_STATS_PAT" ]; then
            echo "::error::Required repository secret is missing or empty."
            exit 1
          fi

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_title=true&commits_year=2026
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1.1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_title=true&card_width=480
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_PAT }}

      - name: Download streak stats SVG
        run: |
          ts="$(date +%s)"
          curl -fsSL -H "Cache-Control: no-cache" \
            "https://streak-stats.demolab.com/?user=${{ github.repository_owner }}&theme=dark&hide_border=false&border=e4e2e2&cache_bust=${ts}" \
            -o profile/streak.svg

      - name: Download activity graph SVG
        run: |
          ts="$(date +%s)"
          curl -fsSL -H "Cache-Control: no-cache" \
            "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=github-dark&hide_border=true&cache_bust=${ts}" \
            -o profile/activity.svg

      - name: Download GitHub trophy SVG
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          trophy_path="profile/trophy.svg"
          trophy_query="username=${REPO_OWNER}&theme=darkhub&no-frame=true&margin-w=6&margin-h=6&column=7"
          for base in \
            "https://gh-trophy.cdnsoft.net" \
            "https://trophy.benkou.dev" \
            "https://trophy.ryglcloud.net"; do
            if curl -fsSL "${base}/?${trophy_query}" -o "${trophy_path}.new" && \
               [ -s "${trophy_path}.new" ] && head -c 400 "${trophy_path}.new" | grep -q '<svg'; then
              mv "${trophy_path}.new" "${trophy_path}"
              rm -f "${trophy_path}.new"
              exit 0
            fi
            rm -f "${trophy_path}.new"
          done
          if git cat-file -e "HEAD:${trophy_path}" 2>/dev/null; then
            git checkout HEAD -- "${trophy_path}"
            echo "::warning::Trophy mirrors failed; kept committed SVG."
            exit 0
          fi
          echo "::error::Trophy SVG could not be downloaded and no previous file exists."
          exit 1

      - name: Generate repo pin card (turkcell)
        uses: readme-tools/github-readme-stats-action@v1.1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=turkcell&theme=dark&show_owner=true
          path: profile/pin-turkcell.svg
          token: ${{ secrets.README_STATS_PAT }}

      - name: Generate repo pin card (peakIntern)
        uses: readme-tools/github-readme-stats-action@v1.1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=peakIntern&theme=dark&show_owner=true
          path: profile/pin-peakintern.svg
          token: ${{ secrets.README_STATS_PAT }}

      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg profile/streak.svg profile/activity.svg profile/trophy.svg profile/pin-turkcell.svg profile/pin-peakintern.svg
          if git diff --staged --quiet; then
            echo "No changes to SVG files; skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh profile readme SVGs"
          git push
