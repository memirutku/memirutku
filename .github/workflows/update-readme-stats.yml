# Private + public istatistikler için classic PAT kullan: repo + read:user
# Repo ayarları → Secrets → Actions → README_STATS_PAT
# Sonra: Actions → "Update README stats" → Run workflow

name: Update README stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-readme-stats
  cancel-in-progress: true

jobs:
  cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Verify README_STATS_PAT secret
        env:
          README_STATS_PAT: ${{ secrets.README_STATS_PAT }}
        run: |
          if [ -z "$README_STATS_PAT" ]; then
            echo "::error::README_STATS_PAT yok veya boş. Repo → Settings → Secrets and variables → Actions → Repository secrets altında ekleyin (Environment secret yetmez)."
            exit 1
          fi
          echo "README_STATS_PAT tanımlı; kartlar authenticated GitHub API ile üretilecek."

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_title=true&commits_year=2026
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1.1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_title=true
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_PAT }}

      - name: Write card summary to job log
        run: |
          echo "## Üretilen istatistik kartı (SVG içinden)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          grep -o '<desc id="descId">[^<]*</desc>' profile/stats.svg | sed 's/<[^>]*>//g' >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          if git diff --staged --quiet; then
            echo "SVG dosyaları önceki commit ile aynı; yeni commit oluşturulmadı."
            echo "Profilde hâlâ eski görünüyorsa: GitHub → Settings → Profile → Contributions → **Include private contributions on my profile** açık olsun."
            exit 0
          fi
          git commit -m "chore: refresh GitHub readme stat SVGs"
          git push
